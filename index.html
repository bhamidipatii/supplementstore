<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Wellness Survey | April 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#000;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}

/* ===================== SWIPE STAGE ===================== */
.swipe-stage{
  width:100%;max-width:480px;height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:2.5rem 1.5rem 2rem;
  position:relative;
}
.sw-top{width:100%;margin-bottom:1.5rem}
.sw-title{font-size:clamp(42px,12vw,72px);font-weight:700;line-height:.95;letter-spacing:-.02em;text-transform:uppercase;color:#fff}
.sw-prog{width:100%;height:2px;background:rgba(255,255,255,.15);border-radius:2px;margin-top:1rem}
.sw-prog-fill{height:100%;background:#fff;border-radius:2px;transition:width .4s ease}

/* card stack */
.card-stack{
  position:relative;width:100%;
  flex:1;display:flex;align-items:center;justify-content:center;
  margin:1rem 0;
}
.swipe-card{
  position:absolute;
  width:92%;max-width:360px;
  background:#f0f0ee;
  border-radius:24px;
  padding:1.75rem;
  display:flex;flex-direction:column;gap:1.25rem;
  cursor:grab;
  transform-origin:center bottom;
  will-change:transform;
  touch-action:none;
}
.swipe-card:active{cursor:grabbing}
.swipe-card.top{z-index:10}
.swipe-card.b1{z-index:9;transform:rotate(-4deg) translateY(12px) scale(.97);pointer-events:none}
.swipe-card.b2{z-index:8;transform:rotate(4deg) translateY(22px) scale(.94);pointer-events:none}
.swipe-card.b3{z-index:7;transform:rotate(-2deg) translateY(32px) scale(.91);pointer-events:none}

.card-tag{
  display:inline-block;align-self:flex-start;
  background:#fff;color:#1a1a1a;
  font-size:13px;font-weight:500;
  padding:5px 14px;border-radius:20px;
}
.card-text{
  font-family:'DM Sans',sans-serif;
  font-size:clamp(22px,5.5vw,30px);
  font-weight:400;
  line-height:1.25;
  color:#1a1a1a;
  flex:1;
}

/* swipe overlays */
.ov-yes,.ov-no{
  position:absolute;top:1.5rem;
  padding:6px 14px;border-radius:8px;
  font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  opacity:0;transition:opacity .08s;pointer-events:none;
}
.ov-yes{left:1.5rem;background:#d4f5e2;color:#1a6b3a;border:2px solid #1a6b3a}
.ov-no{right:1.5rem;background:#fde8e8;color:#b91c1c;border:2px solid #b91c1c}

/* hint */
.sw-hint{
  display:flex;align-items:center;justify-content:center;gap:2rem;
  font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.06em;
}
.sw-hint span{display:flex;align-items:center;gap:6px}
.hint-icon{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;
}
.hint-no{background:rgba(185,28,28,.25);color:#f87171}
.hint-yes{background:rgba(26,107,58,.25);color:#4ade80}

/* ===================== FORM STAGE ===================== */
.form-stage{
  width:100%;max-width:480px;
  min-height:100vh;
  display:flex;flex-direction:column;
  background:#fff;color:#1a1916;
  overflow-y:auto;
}
.f-header{padding:1.5rem 1.75rem 0}
.f-pill{
  display:inline-block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  color:#9a9890;border:0.5px solid rgba(0,0,0,.12);border-radius:20px;
  padding:3px 10px;margin-bottom:.875rem;
}
.f-prog-track{height:1.5px;background:rgba(0,0,0,.1);margin:0 1.75rem}
.f-prog-fill{height:100%;background:#1a1916;border-radius:2px;transition:width .5s ease}
.f-body{padding:1.25rem 1.75rem .875rem;display:flex;flex-direction:column;gap:1.1rem;flex:1}
.q-meta{font-size:11px;color:#9a9890;letter-spacing:.08em;text-transform:uppercase}
.q-text{font-family:'Fraunces',serif;font-size:21px;font-weight:300;line-height:1.45;color:#1a1916}
.q-sub{font-size:12px;color:#9a9890;font-style:italic}
.options{display:flex;flex-direction:column;gap:6px}
.opt{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;border:0.5px solid rgba(0,0,0,.12);
  border-radius:10px;cursor:pointer;
  background:#fff;font-size:13px;color:#1a1916;
  text-align:left;width:100%;transition:all .15s;
  font-family:'DM Sans',sans-serif;
}
.opt:hover{border-color:rgba(0,0,0,.22);background:#f5f4f2}
.opt.selected{border-color:rgba(0,0,0,.32);background:#f5f4f2}
.ind{
  width:16px;height:16px;flex-shrink:0;
  border:1px solid rgba(0,0,0,.22);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.ind.r{border-radius:50%}.ind.s{border-radius:3px}
.opt.selected .ind{background:#1a1916;border-color:#1a1916}
.tk{display:none}
.opt.selected .tk{display:block}
.other-input{
  width:100%;padding:8px 12px;margin-top:4px;
  border:0.5px solid rgba(0,0,0,.12);border-radius:8px;
  background:#f5f4f2;font-family:'DM Sans',sans-serif;
  font-size:13px;color:#1a1916;outline:none;
}
.other-input:focus{border-color:rgba(0,0,0,.3)}
.plain-input{
  width:100%;padding:10px 14px;
  border:0.5px solid rgba(0,0,0,.12);border-radius:10px;
  background:#f5f4f2;font-family:'DM Sans',sans-serif;
  font-size:14px;color:#1a1916;outline:none;
}
.plain-input:focus{border-color:rgba(0,0,0,.3)}

/* voice */
.voice-area{
  background:#f5f4f2;border:0.5px solid rgba(0,0,0,.12);
  border-radius:12px;padding:14px 16px;
}
.mic-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mic-btn{
  width:42px;height:42px;border-radius:50%;
  border:0.5px solid rgba(0,0,0,.2);
  background:#fff;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .2s;position:relative;
}
.mic-btn svg{width:17px;height:17px;color:#5a5852}
.mic-btn.on{background:#fff0f0;border-color:transparent}
.mic-btn.on svg{color:#b91c1c}
.pulse{
  display:none;position:absolute;inset:-7px;border-radius:50%;
  border:1px solid #b91c1c;opacity:.4;
  animation:po 1.4s ease-out infinite;
}
.mic-btn.on .pulse{display:block}
@keyframes po{0%{transform:scale(1);opacity:.5}100%{transform:scale(1.65);opacity:0}}
.mic-status{font-size:12px;color:#9a9890}
.mic-status.live{color:#b91c1c}
.voice-ta{
  width:100%;background:transparent;border:none;outline:none;
  font-family:'DM Sans',sans-serif;font-size:14px;
  line-height:1.65;color:#1a1916;resize:none;min-height:56px;
}
.voice-ta::placeholder{color:#b0aea8}
.edit-note{font-size:11px;color:#9a9890;margin-top:6px;text-align:right}

/* scale */
.scale-row{display:flex;gap:6px;flex-wrap:wrap}
.scale-btn{
  width:44px;height:44px;border-radius:10px;
  border:0.5px solid rgba(0,0,0,.12);background:#fff;
  font-size:14px;font-weight:500;cursor:pointer;color:#5a5852;
  transition:all .15s;font-family:'DM Sans',sans-serif;
}
.scale-btn.selected{background:#1a1916;color:#fff;border-color:#1a1916}
.scale-labels{display:flex;justify-content:space-between;font-size:11px;color:#9a9890;margin-top:4px}

/* rank */
.rank-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 13px;border:0.5px solid rgba(0,0,0,.12);
  border-radius:10px;background:#fff;cursor:grab;
  margin-bottom:6px;font-size:13px;color:#1a1916;user-select:none;
}
.rank-num{
  width:22px;height:22px;border-radius:50%;background:#f5f4f2;
  border:0.5px solid rgba(0,0,0,.12);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:500;color:#5a5852;flex-shrink:0;
}

/* footer */
.f-footer{
  padding:.875rem 1.75rem 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  border-top:0.5px solid rgba(0,0,0,.08);
  background:#fff;
}
.btn-skip{
  background:none;border:none;font-family:'DM Sans',sans-serif;
  font-size:13px;color:#9a9890;cursor:pointer;padding:0;
}
.btn-skip:hover{color:#5a5852}
.nav-row{display:flex;gap:8px}
.btn-back{
  background:none;border:0.5px solid rgba(0,0,0,.2);
  font-family:'DM Sans',sans-serif;font-size:13px;color:#5a5852;
  cursor:pointer;border-radius:10px;padding:9px 18px;transition:background .15s;
}
.btn-back:hover{background:#f5f4f2}
.btn-next{
  background:#1a1916;color:#fff;border:none;border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  padding:9px 24px;cursor:pointer;transition:opacity .2s;
}
.btn-next:disabled{opacity:.25;cursor:default}
.btn-next:not(:disabled):hover{opacity:.82}

/* done */
.done-stage{
  width:100%;max-width:480px;min-height:100vh;
  background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:2.5rem 2rem;text-align:center;gap:1.25rem;
}
.done-title{font-size:clamp(42px,12vw,72px);font-weight:700;line-height:.95;letter-spacing:-.02em;text-transform:uppercase;color:#fff}
.done-sub{font-size:15px;color:rgba(255,255,255,.55);max-width:320px;line-height:1.65}
.tally{display:flex;gap:12px;margin-top:.5rem}
.tally-box{
  flex:1;background:rgba(255,255,255,.06);border:0.5px solid rgba(255,255,255,.12);
  border-radius:12px;padding:16px;text-align:center;
}
.tally-num{font-size:28px;font-weight:700}
.tally-label{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px;letter-spacing:.06em;text-transform:uppercase}
.tally-yes .tally-num{color:#4ade80}
.tally-no .tally-num{color:#f87171}
</style>
</head>
<body>
<div id="app"></div>

<script>
const SWIPE_CARDS = [
  {id:'s1',  tag:'Health identity',   text:'I actively invest time and money in improving my health.'},
  {id:'s2',  tag:'Supplements',       text:'I take supplements or vitamins regularly.'},
  {id:'s3',  tag:'Influence',         text:'Podcasts like Huberman Lab or Peter Attia shape how I think about wellness.'},
  {id:'s4',  tag:'Influence',         text:'My doctor or nutritionist guides my supplement choices.'},
  {id:'s5',  tag:'Testing',           text:'I\'ve had a blood test specifically to check for nutritional deficiencies — not just a routine checkup.'},
  {id:'s6',  tag:'Clinics',           text:'I\'ve visited a wellness clinic or longevity centre.'},
  {id:'s7',  tag:'Frustration',       text:'I don\'t really know if what I\'m taking is actually working.'},
  {id:'s8',  tag:'Frustration',       text:'There\'s too much conflicting information — it\'s hard to know who to trust.'},
  {id:'s9',  tag:'Confidence',        text:'I\'m confident the supplements I take are the right ones for my body.'},
  {id:'s10', tag:'Personalisation',   text:'I\'d trust a supplement formula made specifically for me, based on a blood test or health assessment.'},
  {id:'s11', tag:'Format',            text:'I\'d prefer one single daily formula over managing multiple separate supplements.'},
  {id:'s12', tag:'Brand values',      text:'It matters to me that a wellness brand understands Indian bodies specifically — not just adapts a Western product.'},
];

const FORM_QS = [
  {id:'q2',type:'check',required:true,section:'Your routine',
    text:'What does your typical workout week look like?',sub:'Select all that apply.',
    opts:['Strength training / weight training','Pilates / barre','CrossFit / functional training','Running / endurance sports','Yoga','Sports (tennis, swimming, cycling, etc.)','I work out but nothing structured','I don\'t work out regularly'],other:true},
  {id:'q4',type:'voice',required:false,section:'Your routine',
    text:'Can you list what supplements you currently take — or used to take?',
    sub:'Brand names most useful. Skip if not applicable.',
    placeholder:'Speak or type — e.g. Thorne B-Complex, Magnesium Glycinate, AG1...'},
  {id:'q5',type:'check',required:false,section:'Your routine',
    text:'Where do you currently buy your supplements?',sub:'Select all that apply.',
    opts:['Amazon India','International websites (iHerb, Bioniq, Thorne, etc.)','Local pharmacy or health store','Brand\'s own website','Quick commerce (Zepto, Blinkit, Swiggy Instamart)','Someone else buys them','I bring them from trips abroad','N/A — I don\'t buy supplements'],other:true},
  {id:'q6',type:'radio',required:true,section:'Your routine',
    text:'Roughly how much do you spend on supplements and wellness products per month?',
    opts:['Less than ₹2,000','₹2,000 to 5,000','₹5,000 to 10,000','₹10,000 to 20,000','More than ₹20,000','I don\'t track this / not sure','I don\'t buy supplements']},
  {id:'q7',type:'check',required:true,section:'What shapes your choices',
    text:'Who or what influences your wellness choices the most?',
    opts:['Podcasts (Huberman, Peter Attia, Rhonda Patrick, etc.)','Indian social media / wellness influencers','Foreign social media / wellness influencers','Friends or family','My doctor, nutritionist, or health practitioner','Longevity / biohacking content (Bryan Johnson, Dave Asprey)','My gym trainer','I research on my own (Google, Reddit)','I don\'t consume wellness content']},
  {id:'q9a',type:'voice',required:false,section:'What shapes your choices',
    text:'Which wellness clinic or facility did you visit?',
    sub:'Skip if not applicable.',
    placeholder:'Speak or type — e.g. SHA Wellness, Viome, Lanserhof...'},
  {id:'q11',type:'scale',required:false,section:'Personalisation',
    text:'How confident are you that your current supplements are right for your body?',
    min:'Not confident',max:'Extremely confident',n:5},
  {id:'q14',type:'rank',required:true,section:'Personalisation',
    text:'Rank these in order of interest — if a premium wellness space offered them.',
    sub:'Drag to reorder — 1 = most interested.',
    items:['A personalised supplement formula based on a quiz or blood test','Formulated beverages for my specific needs','A curated selection of vetted global wellness products','Access to wellness practitioners for my specific protocol']},
  {id:'q16',type:'radio',required:true,section:'Trust & brand',
    text:'What would make you most likely to trust a new wellness brand in India?',
    opts:['Recommendation from someone I respect','A brand backed by medical professionals','Founders or early users I recognise','International quality certifications','Measurable results in my own health data','Premium design and in-store experience'],other:true},
  {id:'q18',type:'radio',required:true,section:'Trust & brand',
    text:'How much would you pay per month for a personalised supplement subscription?',
    opts:['Less than ₹1,000','₹1,000 to 3,000','₹3,000 to 5,000','₹5,000 to 8,000','More than ₹8,000 if quality justifies it','I\'d need to try it first']},
  {id:'q19',type:'voice',required:true,section:'One last thing',
    text:'If you could fix one thing about how you manage your health today, what would it be?',
    placeholder:'Take your time. No right or wrong answers.'},
  {id:'q20',type:'radio',required:true,section:'About you',
    text:'Age range',opts:['18 to 24','25 to 30','31 to 35','36 to 40','41 to 50','51+']},
  {id:'q21',type:'radio',required:true,section:'About you',
    text:'Gender',opts:['Male','Female','Prefer not to say']},
  {id:'q22',type:'text',required:true,section:'About you',
    text:'City you currently live in',placeholder:'Type your city...'},
  {id:'q23',type:'radio',required:true,section:'About you',
    text:'Which best describes your professional situation?',
    opts:['Founder / entrepreneur','Senior executive / C-suite','Working professional','Creative / freelance / consulting','Homemaker with active personal interests','Student'],other:true},
  {id:'q24',type:'radio',required:true,section:'About you',
    text:'Have you travelled internationally in the past 12 months?',
    opts:['Yes, more than 3 times','Yes, 1 to 3 times','No, but I plan to','No']},
];

let stage = 'swipe';
let swipeIdx = 0;
let swipeAnswers = {};
let yesCount = 0, noCount = 0;
let formIdx = 0;
let formAnswers = {};
let rankOrders = {};
let voiceText = {};
let micActive = false;
let recognition = null;
const app = document.getElementById('app');

/* ---- SPEECH ---- */
function getSpeech(){
  const S=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!S)return null;
  const r=new S();r.continuous=true;r.interimResults=true;r.lang='en-IN';return r;
}
function stopMic(){if(recognition){recognition.stop();recognition=null;}micActive=false;}

/* ===================== SWIPE ===================== */
function renderSwipe(){
  const pct=Math.round((swipeIdx/SWIPE_CARDS.length)*100);
  const visible=SWIPE_CARDS.slice(swipeIdx,swipeIdx+4);

  app.innerHTML=`<div class="swipe-stage">
    <div class="sw-top">
      <div class="sw-title">Quick<br>takes</div>
      <div class="sw-prog"><div class="sw-prog-fill" id="spf" style="width:${pct}%"></div></div>
    </div>
    <div class="card-stack" id="cstack">
      ${visible.slice().reverse().map((c,ri)=>{
        const fwdIdx=visible.length-1-ri;
        let cls=fwdIdx===0?'top':fwdIdx===1?'b1':fwdIdx===2?'b2':'b3';
        return `<div class="swipe-card ${cls}" data-id="${c.id}" data-top="${fwdIdx===0?1:0}">
          <div class="ov-yes">relate ✓</div>
          <div class="ov-no">✕ pass</div>
          <span class="card-tag">${c.tag}</span>
          <p class="card-text">${c.text}</p>
        </div>`;
      }).join('')}
    </div>
    <div class="sw-hint">
      <span><span class="hint-icon hint-no">✕</span> swipe left = no</span>
      <span><span class="hint-icon hint-yes">✓</span> swipe right = yes</span>
    </div>
  </div>`;

  setupSwipeDrag();
}

function setupSwipeDrag(){
  const card=document.querySelector('.swipe-card.top');
  if(!card)return;
  let sx=0,sy=0,cx=0,dragging=false;

  function start(x,y){sx=x;sy=y;dragging=true;card.style.transition='none';}
  function move(x,y){
    if(!dragging)return;
    cx=x-sx;
    const rot=cx*0.07;
    card.style.transform=`translateX(${cx}px) rotate(${rot}deg)`;
    const oy=card.querySelector('.ov-yes'),on=card.querySelector('.ov-no');
    if(cx>30){oy.style.opacity=Math.min(1,(cx-30)/70);on.style.opacity=0;}
    else if(cx<-30){on.style.opacity=Math.min(1,(-cx-30)/70);oy.style.opacity=0;}
    else{oy.style.opacity=0;on.style.opacity=0;}
  }
  function end(){
    if(!dragging)return;dragging=false;
    card.style.transition='transform .3s ease';
    if(cx>80) fly(true);
    else if(cx<-80) fly(false);
    else{
      card.style.transform='';
      card.querySelector('.ov-yes').style.opacity=0;
      card.querySelector('.ov-no').style.opacity=0;
    }
  }
  function fly(yes){
    card.style.transition='transform .35s ease,opacity .3s ease';
    card.style.transform=`translateX(${yes?500:-500}px) rotate(${yes?20:-20}deg)`;
    card.style.opacity='0';
    setTimeout(()=>recordSwipe(yes),320);
  }

  card.addEventListener('mousedown',e=>{start(e.clientX,e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>{move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{if(dragging)end();});
  card.addEventListener('touchstart',e=>{const t=e.touches[0];start(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{const t=e.touches[0];move(t.clientX,t.clientY);},{passive:true});
  card.addEventListener('touchend',()=>{if(dragging)end();});
}

function recordSwipe(yes){
  const c=SWIPE_CARDS[swipeIdx];
  swipeAnswers[c.id]=yes;
  if(yes)yesCount++;else noCount++;
  swipeIdx++;
  if(swipeIdx>=SWIPE_CARDS.length){stage='form';formIdx=0;renderForm();}
  else renderSwipe();
}

/* ===================== FORM ===================== */
function isAnswered(i){
  const q=FORM_QS[i];
  if(!q.required)return true;
  if(q.type==='radio')return !!formAnswers[q.id];
  if(q.type==='check')return(formAnswers[q.id]||[]).length>0;
  if(q.type==='scale')return formAnswers[q.id]!==undefined;
  if(q.type==='rank')return true;
  if(q.type==='voice')return(voiceText[q.id]||'').trim().length>0;
  if(q.type==='text')return(formAnswers[q.id]||'').trim().length>0;
  return false;
}

function renderForm(){
  stopMic();
  if(formIdx>=FORM_QS.length){renderDone();return;}
  const q=FORM_QS[formIdx];
  const totalQ=SWIPE_CARDS.length+FORM_QS.length;
  const doneQ=swipeIdx+formIdx;
  const pct=Math.round((doneQ/totalQ)*100);
  const qnum=doneQ+1;
  const canNext=isAnswered(formIdx);

  let body='';
  if(q.type==='radio'){
    body=`<div class="options">${q.opts.map(o=>`
      <button class="opt${formAnswers[q.id]===o?' selected':''}" onclick="selR('${q.id}','${esc(o)}')">
        <span class="ind r"><svg class="tk" width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="#fff" stroke-width="2"><polyline points="1,4.5 3.5,7 8,2"/></svg></span>
        <span>${o}</span></button>`).join('')}
      ${q.other?`<input class="other-input" placeholder="Other..." value="${formAnswers[q.id+'_o']||''}" oninput="formAnswers['${q.id}_o']=this.value"/>`:''}
    </div>`;
  } else if(q.type==='check'){
    const sel=formAnswers[q.id]||[];
    body=`<div class="options">${q.opts.map(o=>`
      <button class="opt${sel.includes(o)?' selected':''}" onclick="selC('${q.id}','${esc(o)}')">
        <span class="ind s"><svg class="tk" width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="#fff" stroke-width="2"><polyline points="1,4.5 3.5,7 8,2"/></svg></span>
        <span>${o}</span></button>`).join('')}
      ${q.other?`<input class="other-input" placeholder="Other..." value="${formAnswers[q.id+'_o']||''}" oninput="formAnswers['${q.id}_o']=this.value"/>`:''}
    </div>`;
  } else if(q.type==='scale'){
    const v=formAnswers[q.id];
    body=`<div><div class="scale-row">${[1,2,3,4,5].map(n=>`
      <button class="scale-btn${v===n?' selected':''}" onclick="selS('${q.id}',${n})">${n}</button>`).join('')}</div>
      <div class="scale-labels"><span>${q.min}</span><span>${q.max}</span></div></div>`;
  } else if(q.type==='rank'){
    if(!rankOrders[q.id])rankOrders[q.id]=[...q.items];
    body=`<div>${rankOrders[q.id].map((it,i)=>`
      <div class="rank-item" draggable="true" data-qid="${q.id}" data-idx="${i}"
        ondragstart="dS(event)" ondragover="dO(event)" ondrop="dD(event)">
        <span class="rank-num">${i+1}</span><span>${it}</span>
        <span style="margin-left:auto;color:#b0aea8;font-size:14px">⠿</span>
      </div>`).join('')}</div>`;
  } else if(q.type==='voice'){
    const txt=voiceText[q.id]||'';
    body=`<div class="voice-area">
      <div class="mic-row">
        <button class="mic-btn" id="mb-${q.id}" onclick="tMic('${q.id}')">
          <div class="pulse"></div>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0M12 19v3M9 22h6"/>
          </svg>
        </button>
        <span class="mic-status" id="ms-${q.id}">tap to speak</span>
      </div>
      <textarea class="voice-ta" id="vt-${q.id}" rows="3"
        placeholder="${q.placeholder||'Speak or type...'}"
        oninput="voiceText['${q.id}']=this.value;rN()">${txt}</textarea>
      ${txt?'<div class="edit-note">you can edit this</div>':''}
    </div>`;
  } else if(q.type==='text'){
    body=`<input class="plain-input" value="${formAnswers[q.id]||''}"
      placeholder="${q.placeholder||''}" oninput="formAnswers['${q.id}']=this.value;rN()"/>`;
  }

  app.innerHTML=`<div class="form-stage">
    <div class="f-header"><span class="f-pill">${q.section}</span></div>
    <div class="f-prog-track"><div class="f-prog-fill" style="width:${pct}%"></div></div>
    <div class="f-body">
      <p class="q-meta">Question ${qnum} of ${totalQ}</p>
      <p class="q-text">${q.text}</p>
      ${q.sub?`<p class="q-sub">${q.sub}</p>`:''}
      ${body}
    </div>
    <div class="f-footer">
      <button class="btn-skip" onclick="fSkip()">${q.required?'':'skip'}</button>
      <div class="nav-row">
        <button class="btn-back" onclick="fBack()">← back</button>
        <button class="btn-next" id="fn" ${canNext?'':'disabled'} onclick="fNext()">
          ${formIdx===FORM_QS.length-1?'submit':'next →'}
        </button>
      </div>
    </div>
  </div>`;
}

function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'");}
function rN(){const b=document.getElementById('fn');if(b)b.disabled=!isAnswered(formIdx);}
function selR(id,val){formAnswers[id]=val;renderForm();}
function selC(id,val){
  if(!formAnswers[id])formAnswers[id]=[];
  const i=formAnswers[id].indexOf(val);
  if(i>-1)formAnswers[id].splice(i,1);else formAnswers[id].push(val);
  renderForm();
}
function selS(id,val){formAnswers[id]=val;renderForm();}
let dIdx=null,dQid=null;
function dS(e){dIdx=parseInt(e.currentTarget.dataset.idx);dQid=e.currentTarget.dataset.qid;}
function dO(e){e.preventDefault();}
function dD(e){
  e.preventDefault();
  const t=e.target.closest('.rank-item');
  if(!t||!dQid)return;
  const to=parseInt(t.dataset.idx);
  if(dIdx===null||dIdx===to)return;
  const arr=rankOrders[dQid];
  const m=arr.splice(dIdx,1)[0];arr.splice(to,0,m);
  dIdx=null;dQid=null;renderForm();
}
function tMic(qid){
  if(micActive){stopMic();renderForm();return;}
  const SR=getSpeech();
  if(!SR){const s=document.getElementById('ms-'+qid);if(s)s.textContent='mic not supported — type below';return;}
  micActive=true;
  const btn=document.getElementById('mb-'+qid);
  const status=document.getElementById('ms-'+qid);
  const ta=document.getElementById('vt-'+qid);
  if(btn)btn.classList.add('on');
  if(status){status.textContent='listening...';status.classList.add('live');}
  const base=voiceText[qid]||'';
  recognition=SR;
  SR.onresult=e=>{
    let fin=base,interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){fin+=(fin?' ':'')+e.results[i][0].transcript;voiceText[qid]=fin;}
      else interim=e.results[i][0].transcript;
    }
    if(ta)ta.value=fin+(interim?' '+interim:'');
    rN();
  };
  SR.onerror=()=>{stopMic();renderForm();};
  SR.onend=()=>{if(micActive)SR.start();};
  SR.start();
}
function fNext(){formIdx++;renderForm();}
function fBack(){
  stopMic();
  if(formIdx>0){formIdx--;renderForm();}
  else{stage='swipe';swipeIdx=SWIPE_CARDS.length-1;renderSwipe();}
}
function fSkip(){if(!FORM_QS[formIdx].required){formIdx++;renderForm();}}

/* ===================== DONE ===================== */
function renderDone(){
  app.innerHTML=`<div class="done-stage">
    <div class="done-title">Thank<br>you.</div>
    <p class="done-sub">Your responses have been recorded. Honest detail like this is exactly what good research needs.</p>
    <div class="tally">
      <div class="tally-box tally-yes"><div class="tally-num">${yesCount}</div><div class="tally-label">related to</div></div>
      <div class="tally-box tally-no"><div class="tally-num">${noCount}</div><div class="tally-label">passed on</div></div>
    </div>
  </div>`;
}

/* kick off */
renderSwipe();
</script>
</body>
</html>
